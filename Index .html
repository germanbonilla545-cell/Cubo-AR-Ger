<!DOCTYPE html>
<html>
  <head>
    <title>Cubo AR.js Tecnologías Emergentes</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/2.2.1/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs>
      
      <!-- Cara 1: Patrón Hiro → IA -->
      <a-marker preset="hiro">
        <a-entity gltf-model="modelos_3D/MiRedNeuronal.glb" scale="0.5 0.5 0.5"></a-entity>
      </a-marker>

      <!-- Cara 2: Patrón Kanji → IoT -->
      <a-marker preset="kanji">
        <a-entity gltf-model="modelos/turbina.glb" scale="0.5 0.5 0.5"></a-entity>
      </a-marker>

      <!-- Cara 3: Patrón Personalizado → RA -->
      <a-marker type="pattern" url="patrones/pattern-reciclaje.patt">
        <a-entity gltf-model="modelos/reciclaje.glb" scale="0.5 0.5 0.5"></a-entity>
      </a-marker>

      <!-- Cara 4: Patrón Personalizado → Robotica Avanzada -->
      <a-marker type="pattern" url="patrones/pattern-robot.patt">
        <a-entity gltf-model="modelos/robot.glb" scale="0.5 0.5 0.5"></a-entity>
      </a-marker>

      <!-- Cámara -->
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
